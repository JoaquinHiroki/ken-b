name: Git Sync every 15 minutes

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Pull latest
        run: |
          git fetch origin main
          git status
          echo "Sync complete at $(date)"
